<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoodStore Carrito</title>
    <link rel="stylesheet" href="/src/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="store-header">
        <div class="header-container">
            <div class="logo">
                <span class="logo__icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-pizza"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M12 21.5c-3.04 0 -5.952 -.714 -8.5 -1.983l8.5 -16.517l8.5 16.517a19.09 19.09 0 0 1 -8.5 1.983" /><path d="M5.38 15.866a14.94 14.94 0 0 0 6.815 1.634a14.944 14.944 0 0 0 6.502 -1.479" /><path d="M13 11.01v-.01" /><path d="M11 14v-.01" /></svg></span>
                <h1 class="logo__text">Food<span class="logo__span">Store</span></h1>
            </div>

            <nav class="nav">
                <a href="../../admin/home/admin-home.html" class="nav__link" id="admin-nav-link">
                    <i class="nav-link__icon"></i> Panel Administrador
                </a>
                <a href="../../store/home/home.html" class="nav__link">
                    <i class="nav-link__icon"></i> Catálogo
                </a>
                <a href="../cart/cart.html" class="nav__link">
                    <i class="nav-link__icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-shopping-cart"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M4 19a2 2 0 1 0 4 0a2 2 0 1 0 -4 0" /><path d="M15 19a2 2 0 1 0 4 0a2 2 0 1 0 -4 0" /><path d="M17 17h-11v-14h-2" /><path d="M6 5l14 1l-1 7h-13" /></svg></i>
                    <span id="cart-count" class="nav-link__span">0</span>
                </a>
                <button id="logout-btn" class="nav__btn" href="/src/pages/auth/login/login.html">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-logout"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M14 8v-2a2 2 0 0 0 -2 -2h-7a2 2 0 0 0 -2 2v12a2 2 0 0 0 2 2h7a2 2 0 0 0 2 -2v-2" /><path d="M9 12h12l-3 -3" /><path d="M18 15l3 -3" /></svg>Salir
                </button>
            </nav>
        </div>
    </header>
    <main>
        <section class="cart-section">
            <h2 class="cart-section__text">Carrito de Compras</h2>
            <div id="cart-items" class="cart-container">
                <!-- Cart items will be dynamically inserted here -->
            </div>
            <div class="cart-total">
                <strong class="cart-total__text"><span id="total-amount" class="cart-total__price">0.00</span></strong>
            </div>
            <button id="clear-cart-btn" class="cart-section__btn cart-section__btn--clear">Limpiar Carrito</button>
            <button id="checkout-btn" class="cart-section__btn cart-section__btn--checkout">Proceder a Pagar</button>
        </section>
    </main>
    <div id="checkout-modal" class="checkout-modal">
        <div class="checkout-modal__content">
            <button class="checkout-modal__btn checkout-modal__btn--close">×</button>
            <h3 class="checkout-modal__title">Finalizar Compra</h3>
            <form id="checkout-form" class="checkout-form">
                <div class="checkout-form__group">
                    <label for="phone" class="checkout-form__label">Teléfono</label>
                    <input type="tel" id="phone" name="phone" class="checkout-form__input" placeholder="Ej. 1234567890" required>
                </div>
                <div class="checkout-form__group">
                    <label for="address" class="checkout-form__label">Dirección</label>
                    <input type="text" id="address" name="address" class="checkout-form__input" placeholder="Ej. Calle 123, Ciudad, País" required>
                </div>
                <div class="checkout-form__group">
                    <label for="phone" class="checkout-form__label">Forma de Pago</label>
                    <select id="payment-method" name="paymentMethod" class="checkout-form__select" required>
                        <option value="CARD">Tarjeta de Crédito</option>
                        <option value="CASH">Efectivo</option>
                        <option value="TRANSFER">Transferencia</option>
                    </select>
                </div>
                <div class="checkout-form__group">
                    <label for="phone" class="checkout-form__label">Notas Adicionales</label>
                    <textarea id="notes" name="notes" class="checkout-form__textarea" placeholder="Ej. No llevar cebolla" maxlength="255" optional></textarea>
                </div>
                <button type="submit" class="checkout-form__btn checkout-form__btn--submit">Finalizar Compra</button>
                <button type="button" class="checkout-form__btn checkout-form__btn--cancel">Cancelar</button>
        </form>
    </div>
</div>
<script type="module" src="/src/pages/store/cart/cart.js"></script>

</body>

</html>
