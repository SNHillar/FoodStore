<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="/src/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&display=swap" rel="stylesheet">
</head>

<body>
    <main class="auth-card">
        <div class="logo">
            <span class="logo__icon">🍕</span>
            <h1 class="logo__text logo__text--auth">Food<span class="logo__span">Store</span></h1>
        </div>

        <h1 class="auth-card__text">Login</h1>
    
        <form id="form" class="form">
    
            <div class="form-group">
                <label class="form-group__label" for="email">Email</label>
                <input class="form-group__input" id="email" name="email" autocomplete="off" placeholder="example@example.com">
            </div>
            <div class="form-group">
                <label class="form-group__label" for="password">Password</label>
                <input class="form-group__input" type="password" id="password" name="password" autocomplete="off" placeholder="********">
            </div>
            
            <p id="error-message" class="form__error"></p>
            <button class="form__btn login-form__btn--submit" type="submit">Ingresar</button>
            <p class="form__text">
                ¿No tenes una cuenta? <a href="../registro/registro.html" class="form__link">Registrate acá</a>
            </p>
        </form>

    </main>

    <script type="module" src="./login.ts"></script>
</body>

</html>
